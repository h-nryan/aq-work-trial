instruction: |-
  Fix a broken Python CSV data pipeline that silently drops records during transformation.
  
  The script `/app/pipeline.py` is supposed to:
  1. Read CSV files with id, name, value, and category fields
  2. Transform and enrich records with a 'status' field based on value
  3. Handle empty or missing values appropriately
  4. Write all valid records to output CSV
  
  Current bugs causing record loss:
  - Records with empty 'value' field are skipped instead of being converted to 0
  - Integer conversion fails on decimal strings like "42.0" and "99.5"
  - Empty category fields are not handled - should default to 'unknown'
  
  Expected behavior:
  - All records should be written to output (no silent drops)
  - Empty values should be converted to 0 with status='inactive'
  - Decimal strings like "42.0" should be converted to integer 42
  - Positive values get status='active', zero/negative get 'inactive'
  - Missing/empty categories default to 'unknown'
  - Output CSV has fields: id, name, value, status, category
  
  Test data includes:
  - input1.csv: Basic records with integer values
  - input2.csv: Records with decimal string values ("42.0", "99.5")
  - input3.csv: Records with empty value and category fields
  - input4.csv: Large file (5 records) to test all fixes together
  
  Fix all bugs so that:
  - No records are silently dropped
  - Decimal strings are handled correctly
  - Empty values become 0 with proper status
  - All output files have correct record counts
  - CSV format is preserved correctly
  
  Usage: `python pipeline.py <input.csv> <output.csv>`
difficulty: medium
category: data-processing
tags:
