instruction: |-
  Fix a broken log parser that has issues with filtering, time range handling, and output formatting.
  
  The log parser at `/app/log_parser.py` is supposed to:
  1. Parse log files with format: YYYY-MM-DD HH:MM:SS [LEVEL] message
  2. Filter logs by level (INFO, DEBUG, WARNING, ERROR)
  3. Filter logs by time range (--start and --end timestamps)
  4. Generate statistics showing count per log level
  5. Support both text and JSON output formats
  
  The log file format is:
  ```
  2024-01-15 10:30:45 [INFO] Application started
  2024-01-15 10:32:30 [ERROR] Database connection failed
  ```
  
  Command line usage:
  - `log_parser.py <logfile>` - Show all logs
  - `log_parser.py <logfile> --level ERROR` - Show only ERROR logs
  - `log_parser.py <logfile> --start "2024-01-15 10:32:00" --end "2024-01-15 10:34:00"` - Time range
  - `log_parser.py <logfile> --stats` - Show statistics (JSON format)
  - `log_parser.py <logfile> --json` - Output in JSON format
  - Multiple flags can be combined
  
  Requirements:
  - Parse log lines correctly using regex
  - Filter by log level (case-insensitive)
  - Filter by time range (inclusive of start and end)
  - Calculate statistics showing count per level
  - Support both text and JSON output
  - Handle invalid log lines gracefully
  - Preserve original timestamp format in output
  
  The script should work correctly with all test cases and produce properly formatted output.
