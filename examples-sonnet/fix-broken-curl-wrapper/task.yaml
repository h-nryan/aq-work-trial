instruction: |-
  Fix a broken curl wrapper script with incorrect header and authentication handling.
  
  The curl wrapper at `/app/curl_wrapper.py` is supposed to:
  1. Make HTTP requests using curl with proper headers
  2. Support Bearer token authentication via API_KEY environment variable
  3. Allow custom headers via CUSTOM_HEADER environment variable
  4. Support --raw flag to output raw response instead of JSON
  5. Use correct Content-Type header format
  
  Current bugs in the implementation:
  - Header format is incorrect (missing colon separator)
  - Using Basic authentication instead of Bearer token format
  - Not reading or applying CUSTOM_HEADER environment variable
  - Always outputs JSON format even when --raw flag is present
  
  The wrapper should work like this:
  ```bash
  # Basic request with default headers
  python curl_wrapper.py http://example.com/api
  
  # With Bearer token authentication
  API_KEY=secret123 python curl_wrapper.py http://example.com/api
  
  # With custom header
  CUSTOM_HEADER='X-Request-ID: abc123' python curl_wrapper.py http://example.com/api
  
  # Raw output mode
  python curl_wrapper.py http://example.com/api --raw
  
  # Custom content type
  CONTENT_TYPE='application/xml' python curl_wrapper.py http://example.com/api
  ```
  
  Requirements:
  - Fix header format to include colon separator (e.g., 'Content-Type: application/json')
  - Use Bearer token format: 'Authorization: Bearer <token>'
  - Read CUSTOM_HEADER env var and add it to request headers
  - Support --raw flag to output raw response without JSON wrapping
  - Default Content-Type should be 'application/json'
  - Preserve all existing functionality
  
  The script should:
  - Accept URL as first argument
  - Accept optional flags and curl options
  - Return JSON-formatted response by default
  - Return raw response when --raw flag is present
  - Include proper error handling
