instruction: |-
  You are given a small Python CLI `csv_to_json.py` that converts CSV to JSON.
  It currently:
   - Assumes comma delimiter.
   - Treats all rows as data (no header handling).
   - Emits a JSON array of lists (not objects).
  Fix it to meet these requirements:

  Requirements:
   1) Read delimiter from environment variable DELIM (default ',').
   2) Treat the FIRST row as a header row. Output records as JSON objects mapping header->value.
   3) Write UTF-8 JSON to stdout.
   4) Add optional flag `--pretty` to pretty-print output with indentation.
   5) Must work with both inputs provided (commas and semicolons).
  Constraints:
   - Do not change the interface expected by tests (script name, args).
   - No network access.
   - May use only the Python standard library.

  Success criteria:
   - `python csv_to_json.py inputs/sample_commas.csv` prints a JSON array of objects with keys from the header row.
   - With `DELIM=';'`, running on semicolon sample prints correct objects.
   - `--pretty` produces multi-line indented JSON that parses as the same structure.
   
  Note: Tests will capture outputs to files (/tmp/out_commas.json, /tmp/out_semicolons.json, 
  /tmp/out_pretty.json) and validate both file content and direct stdout behavior.
difficulty: easy
