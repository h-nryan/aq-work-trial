instruction: |
  You have been given a broken Python Flask API service that should provide user data endpoints.

  **Files in the project:**
  - `app.py`: Main Flask application file
  - `requirements.txt`: Python dependencies configuration
  - `data/users.json`: User data file

  **Expected API Behavior:**
  1. Start an HTTP server on port 3000 and bind to 0.0.0.0 (server accessible via localhost)
  2. Serve GET /users endpoint that returns an array of at least 4 user objects in JSON format
  3. Serve GET /users/<id> endpoint that returns a specific user by ID or 404 error
  4. Handle multiple sequential requests successfully

  **User Object Schema:**
  Each user object must contain these exact fields:
  ```json
  {
    "id": <integer>,
    "name": <string>,
    "email": <string>,
    "role": <string>
  }
  ```

  **Current Issues:**
  - Missing Flask dependency in requirements.txt
  - Python syntax errors in application files
  - Data file formatting problems
  - Logic errors preventing proper user ID matching
  - Import statement errors

  **Success Criteria:**
  - Server starts and runs on port 3000
  - Both API endpoints return proper JSON responses
  - The /users endpoint returns at least 4 user objects with correct schema
  - The /users/<id> endpoint returns correct user or 404 with error message
  - Flask dependency is properly installed (pip install -r requirements.txt works)
  - Server can handle multiple consecutive requests

  Fix the existing files to meet these requirements.
