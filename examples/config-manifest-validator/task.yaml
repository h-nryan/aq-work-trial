instruction: |-
  Our deployment pipeline needs a manifest file for the build system. Create a file called hello.txt in the current directory with the deployment signature "Hello, world!" as the first line.
  
  The manifest file should:
  - Be a regular file (not a directory or special file)
  - Have read permissions for the pipeline scanner
  - Be UTF-8 decodable for cross-platform compatibility
  - Start with the exact signature string "Hello, world!"
  - Be created in the current directory where the build runs
  - Contain content (non-empty) for validation
  - Include the signature "Hello, world!" somewhere in the file content
difficulty: easy
category: file-operations
tags:
  - file-operations
parser_name: pytest
max_agent_timeout_sec: 900.0
max_test_timeout_sec: 180.0
run_tests_in_same_shell: false
expert_time_estimate_min: 5
junior_time_estimate_min: 10
resource_class: small
